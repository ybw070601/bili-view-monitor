<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站视频播放量监控</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .main-container {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
        }
        .card-main {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .card-header-custom {
            background: linear-gradient(135deg, #fb7299 0%, #ff8aae 100%);
            color: white;
            padding: 30px 30px 25px;
            border-bottom: none;
        }
        .card-header-custom h1 {
            font-weight: 700;
            font-size: 28px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card-header-custom h1 small {
            font-size: 16px;
            font-weight: 300;
            opacity: 0.85;
        }
        .card-body-custom {
            padding: 35px 30px 40px;
        }
        .input-group-custom .form-control {
            border-radius: 12px 0 0 12px;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid #e8ecf1;
            transition: all 0.3s;
        }
        .input-group-custom .form-control:focus {
            border-color: #fb7299;
            box-shadow: 0 0 0 4px rgba(251, 114, 153, 0.15);
        }
        .input-group-custom .btn-primary {
            border-radius: 0 12px 12px 0;
            padding: 14px 30px;
            font-weight: 600;
            background: linear-gradient(135deg, #fb7299 0%, #ff8aae 100%);
            border: none;
            transition: all 0.3s;
        }
        .input-group-custom .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(251, 114, 153, 0.4);
        }
        .input-hint {
            font-size: 13px;
            color: #8895aa;
            margin-top: 12px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .input-hint code {
            background: #f0f2f5;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #fb7299;
        }
        .error-box {
            background: #fff5f5;
            border: 1px solid #fed7d7;
            border-radius: 12px;
            padding: 16px 20px;
            color: #e53e3e;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e8ecf1;
        }
        .feature-item {
            text-align: center;
            padding: 16px;
            background: #f8f9fc;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .feature-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
        }
        .feature-item .icon {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
        }
        .feature-item .label {
            font-size: 14px;
            color: #4a5568;
            font-weight: 500;
        }
        @media (max-width: 768px) {
            .main-container { margin: 20px auto; }
            .card-header-custom { padding: 20px; }
            .card-header-custom h1 { font-size: 22px; flex-wrap: wrap; }
            .card-body-custom { padding: 25px 20px; }
            .input-group-custom .btn-primary { padding: 14px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="card card-main">
            <div class="card-header-custom">
                <h1>
                    📊 B站播放量监控
                    <small>实时追踪 · 目标管理</small>
                </h1>
            </div>
            <div class="card-body-custom">
                <form action="/dashboard" method="get">
                    <div class="input-group input-group-custom">
                        <input type="text" 
                               class="form-control" 
                               name="bvid" 
                               placeholder="输入 BV号 或 视频链接"
                               value="{{ request.args.get('bvid', '') }}">
                        <span class="input-group-text" style="background: #f0f2f5; border: 2px solid #e8ecf1; border-left: none; border-right: none; color: #8895aa; font-weight: 500;">或</span>
                        <input type="text" 
                               class="form-control" 
                               name="fav_id" 
                               placeholder="输入 收藏夹ID 或 收藏夹链接"
                               value="{{ request.args.get('fav_id', '') }}">
                        <button class="btn btn-primary" type="submit">
                            🔍 查询
                        </button>
                    </div>
                    <div class="input-hint">
                        <span>📌 BV号示例: <code>BV1GJ411x7fR</code></span>
                        <span>📁 收藏夹示例: <code>20274814</code> 或 URL中的数字</span>
                    </div>
                </form>

                {% if error %}
                <div class="error-box">
                    <span style="font-size:20px;">⚠️</span>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <div class="feature-grid">
                    <div class="feature-item">
                        <span class="icon">🎬</span>
                        <span class="label">单个视频查询</span>
                    </div>
                    <div class="feature-item">
                        <span class="icon">📂</span>
                        <span class="label">收藏夹批量查询</span>
                    </div>
                    <div class="feature-item">
                        <span class="icon">🎯</span>
                        <span class="label">自定义目标管理</span>
                    </div>
                    <div class="feature-item">
                        <span class="icon">🔄</span>
                        <span class="label">实时刷新数据</span>
                    </div>
                </div>
            </div>
        </div>
        <div style="text-align: center; margin-top: 24px; color: #8895aa; font-size: 14px;">
            Powered by B站 API · 数据仅供个人参考
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
